<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Major Scales</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a2e;
    color: #e8e8f0;
    min-height: 100vh;
    padding: 24px 16px 48px;
  }

  h1 {
    text-align: center;
    font-size: 28px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: #c9b8ff;
    margin-bottom: 8px;
  }

  .subtitle {
    text-align: center;
    font-size: 14px;
    color: #8888aa;
    margin-bottom: 32px;
  }

  .scales-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .scale-card {
    background: #16213e;
    border: 1px solid #2a2a4a;
    border-radius: 14px;
    padding: 18px 20px;
  }

  .scale-title {
    font-size: 15px;
    font-weight: 600;
    color: #c9b8ff;
    margin-bottom: 14px;
    letter-spacing: 0.05em;
  }

  .degree-labels {
    display: flex;
    gap: 6px;
    margin-bottom: 6px;
  }

  .degree-label {
    flex: 1;
    text-align: center;
    font-size: 10px;
    color: #555577;
    font-weight: 500;
    letter-spacing: 0.03em;
  }

  .notes-row {
    display: flex;
    gap: 6px;
  }

  .note-btn {
    flex: 1;
    padding: 10px 4px;
    border-radius: 9px;
    border: 1px solid #2e2e5a;
    background: #0f3460;
    color: #a8c8ff;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.08s, transform 0.08s, color 0.08s, border-color 0.08s;
    text-align: center;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    letter-spacing: 0.01em;
    line-height: 1.2;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .note-btn:hover {
    background: #1a4a80;
    border-color: #5588cc;
    color: #d0e8ff;
  }

  .note-btn:active,
  .note-btn.playing {
    background: #7c4dff;
    border-color: #9c70ff;
    color: #ffffff;
    transform: scale(0.94);
  }

  .legend {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
    font-size: 13px;
    color: #8888aa;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .legend-dot {
    display: inline-block;
    width: 11px;
    height: 11px;
    border-radius: 50%;
    margin-right: 5px;
    vertical-align: middle;
  }
  .dot-1 { background: #ffd060; }
  .dot-3 { background: #ff9977; }
  .dot-5 { background: #66ddaa; }
  .dot-other { background: #4477aa; }
  .deg-1 {
    background: #3a2a00;
    border-color: #aa7700;
    color: #ffd060;
  }
  .deg-1:hover { background: #4a3600; border-color: #cc9900; }
  .deg-1.playing { background: #ffaa00; border-color: #ffdd66; color: #1a1000; }

  /* Degree 3 — coral/orange */
  .deg-3 {
    background: #3a1010;
    border-color: #993322;
    color: #ff9977;
  }
  .deg-3:hover { background: #4a1a14; border-color: #cc4433; }
  .deg-3.playing { background: #dd4422; border-color: #ff7755; color: #fff0ee; }

  /* Degree 5 — teal/green */
  .deg-5 {
    background: #0a2a20;
    border-color: #226644;
    color: #66ddaa;
  }
  .deg-5:hover { background: #0e3828; border-color: #339966; }
  .deg-5.playing { background: #1d9e75; border-color: #66ddaa; color: #ffffff; }

  @media (max-width: 480px) {
    h1 { font-size: 22px; }
    .scales-grid { grid-template-columns: 1fr; }
    .note-btn { font-size: 12px; padding: 8px 2px; }
  }
</style>
</head>
<body>

<h1>Major Scales</h1>
<p class="subtitle">Tap any note to hear it</p>

<div class="legend">
  <span class="legend-dot dot-1"></span><span>Root (1)</span>
  <span class="legend-dot dot-3"></span><span>Third (3)</span>
  <span class="legend-dot dot-5"></span><span>Fifth (5)</span>
  <span class="legend-dot dot-other"></span><span>Other</span>
</div>

<div class="scales-grid" id="scalesGrid"></div>

<script>
const scales = [
  { name: "C major",   notes: ["C","D","E","F","G","A","B"] },
  { name: "C# major",  notes: ["C#","D#","F","F#","G#","A#","C"] },
  { name: "D major",   notes: ["D","E","F#","G","A","B","C#"] },
  { name: "D# major",  notes: ["D#","F","G","G#","A#","C","D"] },
  { name: "E major",   notes: ["E","F#","G#","A","B","C#","D#"] },
  { name: "F major",   notes: ["F","G","A","A#","C","D","E"] },
  { name: "F# major",  notes: ["F#","G#","A#","B","C#","D#","F"] },
  { name: "G major",   notes: ["G","A","B","C","D","E","F#"] },
  { name: "G# major",  notes: ["G#","A#","C","C#","D#","F","G"] },
  { name: "A major",   notes: ["A","B","C#","D","E","F#","G#"] },
  { name: "A# major",  notes: ["A#","C","D","D#","F","G","A"] },
  { name: "B major",   notes: ["B","C#","D#","E","F#","G#","A#"] },
];

/* Chromatic order — used to detect when a note wraps below the root */
const CHROMA_ORDER = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];

/* Base frequencies for octave 4 */
const BASE_FREQ = {
  "C":261.63,"C#":277.18,"D":293.66,"D#":311.13,
  "E":329.63,"F":349.23,"F#":369.99,"G":392.00,
  "G#":415.30,"A":440.00,"A#":466.16,"B":493.88
};

function scaleFrequencies(notes) {
  /* Keep all notes in a single ascending octave.
     Start at octave 4. Each time a note's chromatic index is <= the
     previous note's index, we've wrapped — bump the octave multiplier. */
  const freqs = [];
  let octaveMultiplier = 1;
  let prevChroma = -1;
  notes.forEach(note => {
    const chroma = CHROMA_ORDER.indexOf(note);
    if (chroma <= prevChroma) octaveMultiplier *= 2; // wrap up one octave
    freqs.push(BASE_FREQ[note] * octaveMultiplier);
    prevChroma = chroma;
  });
  return freqs;
}

/* Chord-tone degree classes (1-indexed) */
const CHORD_TONE_CLASS = { 1: 'deg-1', 3: 'deg-3', 5: 'deg-5' };

let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playGuitar(freq) {
  const ctx = getAudioCtx();
  if (ctx.state === 'suspended') ctx.resume();

  const bufferSize = Math.floor(ctx.sampleRate / freq);
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = Math.random() * 2 - 1;
  }

  const source = ctx.createBufferSource();
  source.buffer = buffer;
  source.loop = true;

  const filter = ctx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.setValueAtTime(freq * 4, ctx.currentTime);
  filter.frequency.exponentialRampToValueAtTime(freq * 1.5, ctx.currentTime + 0.05);

  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0.5, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.3, ctx.currentTime + 0.05);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.4);

  source.connect(filter);
  filter.connect(gain);
  gain.connect(ctx.destination);
  source.start();
  source.stop(ctx.currentTime + 1.5);
}

function buildUI() {
  const grid = document.getElementById('scalesGrid');
  const degrees = ["1","2","3","4","5","6","7"];

  scales.forEach(scale => {
    const card = document.createElement('div');
    card.className = 'scale-card';

    const title = document.createElement('div');
    title.className = 'scale-title';
    title.textContent = scale.name;
    card.appendChild(title);

    const labelRow = document.createElement('div');
    labelRow.className = 'degree-labels';
    degrees.forEach(d => {
      const lbl = document.createElement('div');
      lbl.className = 'degree-label';
      lbl.textContent = d;
      labelRow.appendChild(lbl);
    });
    card.appendChild(labelRow);

    const freqs = scaleFrequencies(scale.notes);
    const notesRow = document.createElement('div');
    notesRow.className = 'notes-row';

    scale.notes.forEach((note, idx) => {
      const degree = idx + 1;
      const btn = document.createElement('button');
      const chordClass = CHORD_TONE_CLASS[degree] || '';
      btn.className = 'note-btn' + (chordClass ? ' ' + chordClass : '');
      btn.textContent = note;
      btn.setAttribute('aria-label', `Play ${note} (degree ${degree} of ${scale.name})`);

      const freq = freqs[idx];
      const triggerPlay = () => {
        playGuitar(freq);
        btn.classList.add('playing');
        setTimeout(() => btn.classList.remove('playing'), 200);
      };

      btn.addEventListener('click', triggerPlay);
      btn.addEventListener('touchstart', e => { e.preventDefault(); triggerPlay(); }, { passive: false });
      notesRow.appendChild(btn);
    });

    card.appendChild(notesRow);
    grid.appendChild(card);
  });
}

buildUI();
</script>
</body>
</html>
